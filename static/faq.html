  .faq-a-inner li { margin: 4px 0; }
  .faq-a-inner table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 12px; }
  .faq-a-inner th { background: var(--surface2); color: var(--text); padding: 8px 12px; text-align: left; border: 1px solid var(--border); }
  .faq-a-inner td { padding: 7px 12px; border: 1px solid var(--border); color: var(--text-muted); vertical-align: top; }
  .faq-a-inner tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin: 0 2px; }
  .badge-green { background: rgba(0,212,170,0.2); color: var(--accent2); }

          a: `It is the <strong>AI agent client</strong>. It receives a support query from the user, fetches all 23 tool definitions from the MCP server at startup, runs an <strong>agentic ReAct loop</strong> (up to 6 rounds), calls the Groq LLM, executes tools in parallel, and returns a final resolution that gets persisted to H2.` },

          a: `<table><tr><th>Component</th><th>File</th><th>Responsibility</th></tr>
<tr><td>REST API</td><td>SupportController.java</td><td>POST /api/v1/support/query entry point</td></tr>
<tr><td>Orchestrator</td><td>AgentOrchestrator.java</td><td>Agentic loop — fetch tools → LLM → exec tools → repeat</td></tr>
<tr><td>LLM Client</td><td>GroqClient.java</td><td>Converts protobuf ↔ OpenAI JSON, calls Groq REST API</td></tr>
<tr><td>MCP Client</td><td>McpServerClient.java</td><td>fetchTools() + executeTool() HTTP calls to MCP server</td></tr>

<tr><td>Async Config</td><td>AsyncConfig.java</td><td>Thread pool: 10–20 threads for parallel tool calls</td></tr></table>` },
        { q: "How does the agentic loop work step-by-step?",
          a: `<ol style="padding-left:20px;line-height:2">
<li>User calls <code>POST /api/v1/support/query</code></li>
<li>AgentOrchestrator fetches tool definitions from MCP server (<code>GET /mcp/tools</code>)</li>
<li>Builds initial message history with user query</li>
<li><strong>Round 1–6:</strong> Call GroqClient → receive tool_calls from LLM → dispatch each tool via @Async → collect results</li>
<li>Add tool results to message history</li>
<li>If LLM returns <code>finish_reason: stop</code> (text reply, not tool_call) → loop ends</li>
<li>Save resolved ticket to H2, return answer + tools used + round count</li></ol>` },

spring:

cd adtech-mcp-server

    {
      id: "api", icon: "🌐", label: "API Endpoints", faqs: [
        { q: "What REST endpoints does the client expose?",
          a: `<table><tr><th>Method</th><th>Path</th><th>Description</th></tr>

<tr><td><code>GET</code></td><td><code>/api/v1/support/health-check</code></td><td>Health status</td></tr></table>` },
        { q: "What is the query request/response schema?",
          a: `<strong>Request:</strong><pre>{

  "status": "RESOLVED_BY_AGENT"

          a: `<code>GroqClient.generate()</code> iterates the <code>List&lt;Content&gt;</code> history and maps each protobuf <code>Part</code> to an OpenAI message object:<ul>

<li><code>Part.functionCall</code> → <code>{"role":"assistant","tool_calls":[...]}</code></li>

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
let activeProject = 0;
let activeCategory = 0;
let searchActive = false;

// ─────────────────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────────────────
function renderSidebar(projectIndex, activeCatIndex) {
  const proj = PROJECTS[projectIndex];
  const sb = document.getElementById('sidebar');
  sb.innerHTML = `<div class="sidebar-title">${proj.stack}</div>` +
    proj.categories.map((cat, i) =>
      `<div class="cat-item ${i === activeCatIndex ? 'active' : ''}" onclick="switchCategory(${i})">
        <span class="cat-icon">${cat.icon}</span>
        <span>${cat.label}</span>
        <span class="cat-count">${cat.faqs.length}</span>
      </div>`
    ).join('');
}

function renderContent(projectIndex, catIndex) {
  const proj = PROJECTS[projectIndex];
  const cat = proj.categories[catIndex];
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="section-header">
      <h2>${cat.icon} ${cat.label}</h2>
      <p>${proj.name} &mdash; ${proj.role} &mdash; Port ${proj.port}</p>
    </div>
    <div class="faq-list">
      ${cat.faqs.map((faq, i) => `
        <div class="faq-item" id="faq-${catIndex}-${i}">
          <div class="faq-q" onclick="toggleFAQ('faq-${catIndex}-${i}')">
            <span class="q-num">Q${i+1}</span>
            <span>${faq.q}</span>
            <span class="chevron">▼</span>
          </div>
          <div class="faq-a"><div class="faq-a-inner">${faq.a}</div></div>
        </div>
      `).join('')}
    </div>`;
}

function switchProject(index) {
  document.querySelectorAll('.proj-tab').forEach((t,i) => t.classList.toggle('active', i === index));
  activeProject = index;
  activeCategory = 0;
  searchActive = false;
  document.getElementById('searchInput').value = '';
  renderSidebar(index, 0);
  renderContent(index, 0);
}

function switchCategory(index) {
  activeCategory = index;
  searchActive = false;
  document.getElementById('searchInput').value = '';
  renderSidebar(activeProject, index);
  renderContent(activeProject, index);
}

function toggleFAQ(id) {
  const item = document.getElementById(id);
  if (item) item.classList.toggle('open');
}

// ─────────────────────────────────────────────────────────────────────────────
// SEARCH
// ─────────────────────────────────────────────────────────────────────────────
function searchFAQs(query) {
  const q = query.trim().toLowerCase();
  if (!q) {
    searchActive = false;
    renderSidebar(activeProject, activeCategory);
    renderContent(activeProject, activeCategory);
    return;
  }
  searchActive = true;
  const proj = PROJECTS[activeProject];
  const results = [];
  proj.categories.forEach(cat => {
    cat.faqs.forEach(faq => {
      const inQ = faq.q.toLowerCase().includes(q);
      const inA = faq.a.toLowerCase().includes(q);
      if (inQ || inA) results.push({ cat: cat.label, icon: cat.icon, faq });
    });
  });

  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = `<div class="sidebar-title">Search Results</div>
    <div class="cat-item active"><span class="cat-icon">🔍</span><span>${results.length} match${results.length !== 1 ? 'es' : ''}</span></div>`;

  const content = document.getElementById('content');
  if (!results.length) {
    content.innerHTML = `<div class="no-results"><div class="icon">🔍</div><p>No results for "<strong>${query}</strong>"</p><p style="font-size:12px;margin-top:8px;">Try different keywords or switch projects</p></div>`;
    return;
  }

  const hl = (text) => text.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<span class="highlight">$1</span>');

  content.innerHTML = `
    <div class="section-header">
      <h2>🔍 Search: "${query}"</h2>
      <p>${results.length} result${results.length !== 1 ? 's' : ''} in ${proj.name}</p>
    </div>
    <div class="faq-list">
      ${results.map((r, i) => `
        <div class="faq-item open" id="sr-${i}">
          <div class="faq-q" onclick="toggleFAQ('sr-${i}')">
            <span class="q-num">${r.icon}</span>
            <span>${hl(r.faq.q)}</span>
            <span style="font-size:10px;color:var(--text-muted);margin-left:8px;">${r.cat}</span>
            <span class="chevron">▼</span>
          </div>
          <div class="faq-a"><div class="faq-a-inner">${r.faq.a}</div></div>
        </div>
      `).join('')}
    </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
renderSidebar(0, 0);
renderContent(0, 0);
</script>
