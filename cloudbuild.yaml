steps:
  # Step 1 — Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/python-adtech-mcp-server:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/python-adtech-mcp-server:$BUILD_ID'
      - '.'

  # Step 2 — Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/python-adtech-mcp-server:latest']

  # Step 3 — Deploy to Cloud Run
  #
  #  dev  defaults: min=0, max=3,  memory=256Mi
  #  prod overrides: min=1, max=10, memory=256Mi  (lightweight — no model loading)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'python-adtech-mcp-server'
      - '--image=gcr.io/$PROJECT_ID/python-adtech-mcp-server:latest'
      - '--platform=managed'
      - '--region=${_REGION}'
      - '--memory=${_MEMORY}'
      - '--cpu=${_CPU}'
      - '--min-instances=${_MIN_INSTANCES}'
      - '--max-instances=${_MAX_INSTANCES}'
      - '--concurrency=80'
      - '--allow-unauthenticated'
      - '--set-env-vars=PORT=8082'
      - '--quiet'

substitutions:
  _REGION: 'us-central1'

  # Resources — dev defaults (override for prod)
  _MIN_INSTANCES: '0'    # prod: '1'
  _MAX_INSTANCES: '3'    # prod: '10'
  _MEMORY: '256Mi'       # server is stateless — 256Mi is sufficient in prod too
  _CPU: '1'              # prod: '2' if high concurrency needed

images:
  - 'gcr.io/$PROJECT_ID/python-adtech-mcp-server:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '900s'
